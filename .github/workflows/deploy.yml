name: Deploy Conduit

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-frontend:
    name: Build UI for GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure git HTTPS for GitHub packages
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static site
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_API_URL: ${{ vars.CONDUIT_API_URL || 'https://conduit-api.vercel.app' }}
          NEXT_PUBLIC_CORTEX_URL: ${{ vars.NEXT_PUBLIC_CORTEX_URL }}
        run: npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy-pages:
    name: Deploy UI (GitHub Pages)
    runs-on: ubuntu-latest
    needs: build-frontend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
