<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Soft phosphor glow -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle scanline texture -->
    <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="1" fill="#39ff14" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background — dark phosphor green -->
  <rect width="512" height="512" rx="96" fill="#0e130e"/>

  <!-- Very faint scanline overlay for CRT feel -->
  <rect width="512" height="512" rx="96" fill="url(#scanlines)"/>

  <!-- Prompt symbol group with glow -->
  <g filter="url(#glow)">
    <!-- > chevron (terminal prompt) -->
    <polyline
      points="116,145 296,256 116,367"
      stroke="#39ff14"
      stroke-width="48"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Cursor block -->
    <rect x="316" y="197" width="80" height="118" rx="6" fill="#39ff14"/>
  </g>
</svg>
